<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>XPFarm Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }

        h1,
        h2,
        h3 {
            color: #38bdf8;
        }

        a {
            color: #4ade80;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: #1e293b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .asset-list {
            list-style: none;
            padding: 0;
        }

        .asset-item {
            padding: 10px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
        }

        .asset-item:last-child {
            border-bottom: none;
        }

        .badge {
            background-color: #6366f1;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="text"] {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
        }

        button {
            padding: 10px;
            border-radius: 4px;
            border: none;
            background-color: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #0ea5e9;
        }

        label {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>XPFarm Dashboard</h1>

        <div class="card">
            <h2>Start New Scan</h2>
            <form action="/scan" method="POST">
                <input type="text" name="target" placeholder="Target (e.g., example.com, 1.2.3.4)" required>
                <input type="text" name="asset" placeholder="Asset Name (optional)">
                <label>
                    <input type="checkbox" name="exclude_cf" checked> Exclude Cloudflare IPs
                </label>
                <button type="submit">Start Scan</button>
            </form>
        </div>

        <div class="card">
            <h2>Assets</h2>
            <ul class="asset-list">
                {{range .Assets}}
                <li class="asset-item">
                    <a href="/asset/{{.ID}}">{{.Name}}</a>
                    <span class="badge">ID: {{.ID}}</span>
                </li>
                {{else}}
                <li>No assets found. Start a scan above!</li>
                {{end}}
            </ul>
        </div>
    </div>
</body>

</html>
